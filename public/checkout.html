<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結帳 - OHYA2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --background: #fafafa; --surface: #ffffff; --text: #1f2937; --text-muted: #6b7280; --border: #e5e7eb; --success: #10b981; --error: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--background); color: var(--text); }
    
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--secondary); }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9375rem; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    
    .main { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .page-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 2rem; }
    
    .checkout-layout { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
    
    .checkout-form { background: var(--surface); border-radius: 1rem; border: 1px solid var(--border); padding: 1.5rem; }
    .form-section { margin-bottom: 1.5rem; }
    .form-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9375rem; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    
    .upload-box { border: 2px dashed var(--border); border-radius: 0.5rem; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-box:hover { border-color: var(--primary); }
    .upload-box input { display: none; }
    
    .order-summary { background: var(--surface); border-radius: 1rem; border: 1px solid var(--border); padding: 1.5rem; height: fit-content; }
    .summary-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 1rem; }
    .summary-items { max-height: 300px; overflow-y: auto; }
    .summary-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    .summary-item:last-child { border-bottom: none; }
    .summary-total { font-size: 1.25rem; font-weight: 700; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
    .submit-btn { width: 100%; margin-top: 1rem; }
    
    footer { background: var(--text); color: white; padding: 2rem; margin-top: 3rem; text-align: center; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; }
    .footer-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
    .footer-section a { display: block; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.875rem; }
    .footer-bottom { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-size: 0.75rem; }
    
    @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">OHYA<span>2.0</span></a>
      <a href="/cart.html" class="btn btn-secondary">返回購物車</a>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">💳 結帳</h1>
    
    <form class="checkout-layout" id="checkout-form">
      <!-- Discreet Packaging Notice -->
      <div class="discreet-notice" style="display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #d1fae5, #a7f3d0); padding: 16px; border-radius: 12px; margin-bottom: 20px;">
        <div style="font-size: 28px;">🔒</div>
        <div style="display: flex; flex-direction: column;">
          <strong style="color: #065f46; font-size: 14px;">隱私保護</strong>
          <span style="color: #047857; font-size: 12px;">我們的包裝完全保密，包裹外觀不會顯示任何產品資訊</span>
        </div>
      </div>
      
      <div class="checkout-form">
        <div class="form-section">
          <h3>👤 客戶資料</h3>
          <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label>電話 *</label>
            <input type="tel" id="phone" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" required>
          </div>
        </div>
        
        <div class="form-section">
          <h3>📦 送貨方式</h3>
          <div class="form-group">
            <label>選擇送貨方式 *</label>
            <select id="shipping-method" required>
              <option value="">請選擇...</option>
              <option value="sf_cod">🚚 順豐速運 (到付)</option>
              <option value="macau_cod">🚛 澳門速運 (到付)</option>
              <option value="lalamove_cod">🛵 Lalamove (到付)</option>
            </select>
          </div>
        </div>
        
        <div class="form-section">
          <h3>📍 送貨地址</h3>
          <div class="form-group">
            <label>送貨地址 *</label>
            <textarea id="address" required></textarea>
          </div>
        </div>
        
        <div class="form-section">
          <h3>💳 付款方式</h3>
          <div class="form-group">
            <label>選擇付款方式 *</label>
            <select id="payment-method" required>
              <option value="">請選擇...</option>
              <option value="bank_transfer">銀行轉帳</option>
              <option value="paypal">PayPal</option>
            </select>
          </div>
          
          <div class="form-group" id="bank-info" style="display:none;">
            <div style="background: #f0f9ff; padding: 1rem; border-radius: 0.5rem; font-size: 0.875rem;">
              <strong>銀行轉帳資料：</strong><br>
              銀行：恆生銀行<br>
              帳戶：OHYA2 COMPANY LIMITED<br>
              帳號：123-456789-001<br><br>
              請轉帳後上傳收據
            </div>
            <label style="margin-top:1rem;">上傳轉帳收據 *</label>
            <div class="upload-box" onclick="document.getElementById('proof').click()">
              <input type="file" id="proof" accept="image/*" required>
              <span>📎 Click 上傳收據圖片</span>
            </div>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary submit-btn">確認訂單</button>
      </div>
      
      <div class="order-summary">
        <h3 class="summary-title">訂單摘要</h3>
        <div class="summary-items" id="summary-items"></div>
        <div class="summary-total">
          <div class="summary-row">
            <span>小計</span>
            <span id="subtotal">¥0</span>
          </div>
          <div class="summary-row">
            <span>運費</span>
            <span>到付</span>
          </div>
          <div class="summary-row" style="margin-top:0.5rem;font-size:1.25rem;">
            <span>總計</span>
            <span id="total">¥0</span>
          </div>
        </div>
      </div>
    </form>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-section"><h3>OHYA2.0</h3><a href="/">首頁</a></div>
      <div class="footer-section"><h3>客戶服務</h3><a href="#">聯繫我們</a></div>
      <div class="footer-section"><h3>付款方式</h3><a href="#">銀行轉帳</a></div>
    </div>
    <div class="footer-bottom">© 2026 OHYA2.0 All rights reserved.</div>
  </footer>

  <script>
    document.getElementById('payment-method').addEventListener('change', (e) => {
      document.getElementById('bank-info').style.display = e.target.value === 'bank_transfer' ? 'block' : 'none';
    });
    
    async function loadSummary() {
      const res = await fetch('/api/cart');
      const cart = await res.json();
      const container = document.getElementById('summary-items');
      let total = 0;
      container.innerHTML = cart.map(item => {
        total += item.price * item.quantity;
        return `<div class="summary-item"><span>${item.name} x${item.quantity}</span><span>¥${(item.price * item.quantity).toLocaleString()}</span></div>`;
      }).join('');
      document.getElementById('subtotal').textContent = '¥' + total.toLocaleString();
      document.getElementById('total').textContent = '¥' + total.toLocaleString();
      window.cartTotal = total;
    }
    
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const shippingMethod = document.getElementById('shipping-method').value;
      if (!shippingMethod) {
        alert('請選擇送貨方式');
        return;
      }
      
      const res = await fetch('/api/cart');
      const cart = await res.json();
      
      const formData = new FormData();
      formData.append('items', JSON.stringify(cart.map(i => ({productId: i.productId, quantity: i.quantity, price: i.price}))));
      formData.append('total', window.cartTotal);
      formData.append('shipping_method', shippingMethod);
      
      if (document.getElementById('proof').files[0]) {
        formData.append('proof', document.getElementById('proof').files[0]);
      }
      
      try {
        const result = await fetch('/api/orders', {
          method: 'POST',
          body: formData
        }).then(r => r.json());
        
        if (result.success) {
          alert('訂單已提交！訂單號：' + result.orderId);
          location.href = '/';
        } else {
          alert('提交失敗：' + result.error);
        }
      } catch (e) {
        alert('網絡錯誤');
      }
    });
    
    loadSummary();
  </script>
</body>
</html>
