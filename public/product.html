<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>產品詳情 - OHYA2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --background: #fafafa; --surface: #ffffff; --text: #1f2937; --text-muted: #6b7280; --border: #e5e7eb; --success: #10b981; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--background); color: var(--text); }
    
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--secondary); }
    .header-actions { display: flex; gap: 1rem; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9375rem; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .cart-btn { position: relative; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .cart-badge { position: absolute; top: 0; right: 0; background: var(--secondary); color: white; font-size: 0.75rem; width: 1.25rem; height: 1.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    
    .product-detail { display: grid; grid-template-columns: 400px 1fr; gap: 3rem; }
    .product-image { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 1rem; background: #f3f4f6; }
    .product-info h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .product-code { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
    .product-price { font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
    .product-price .original { font-size: 1rem; color: var(--text-muted); text-decoration: line-through; margin-left: 0.5rem; }
    .product-stock { font-size: 0.875rem; margin-bottom: 1.5rem; }
    .in-stock { color: var(--success); }
    .product-desc { color: var(--text-muted); line-height: 1.8; margin-bottom: 1.5rem; }
    .product-meta { background: var(--surface); border-radius: 0.5rem; padding: 1rem; font-size: 0.875rem; }
    .meta-row { display: flex; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .meta-row:last-child { border-bottom: none; }
    .meta-label { font-weight: 600; width: 120px; }
    .quantity-box { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .qty-btn { width: 36px; height: 36px; border: 1px solid var(--border); background: var(--surface); border-radius: 0.5rem; cursor: pointer; font-size: 1.25rem; }
    .add-btn { width: 100%; margin-top: 1rem; }
    
    /* Image Gallery */
    .thumbnail-gallery { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .thumbnail { width: 75px; height: 75px; object-fit: cover; border-radius: 0.5rem; cursor: pointer; }
    .thumbnail.active { border: 2px solid var(--primary); }
    
    /* Cross-selling */
    .cross-selling { margin-top: 3rem; }
    .cross-selling h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    .cross-selling-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .cross-selling-item img { width: 75px; height: 75px; object-fit: cover; border-radius: 0.5rem; }
    .cross-selling-item .item-info { flex: 1; }
    .cross-selling-item .item-info h3 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    .cross-selling-item .item-info p { color: var(--text-muted); line-height: 1.5; }
    
    footer { background: var(--text); color: white; padding: 2rem; margin-top: 3rem; text-align: center; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; }
    .footer-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
    .footer-section a { display: block; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.875rem; }
    .footer-bottom { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-size: 0.75rem; }
    
    @media (max-width: 768px) { 
      .product-detail { grid-template-columns: 1fr; }
      .thumbnail-gallery { overflow-x: scroll; }
      .cross-selling-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">OHYA<span>2.0</span></a>
      <div class="header-actions">
        <a href="/cart.html" class="cart-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="product-detail" id="product-detail">
      <div class="product-image-wrapper">
        <img src="" alt="產品圖片" class="product-image" id="product-image">
        <div class="thumbnail-gallery" id="thumbnail-gallery">
          <!-- Mock data for thumbnails -->
          <img src="https://via.placeholder.com/75x75" alt="Thumbnail 1" class="thumbnail" onclick="changeMainImage(this)">
          <img src="https://via.placeholder.com/75x75" alt="Thumbnail 2" class="thumbnail" onclick="changeMainImage(this)">
          <img src="https://via.placeholder.com/75x75" alt="Thumbnail 3" class="thumbnail" onclick="changeMainImage(this)">
        </div>
      </div>
      <div class="product-info">
        <h1 id="product-name">載入中...</h1>
        <div class="product-code" id="product-code"></div>
        <div class="product-price" id="product-price"></div>
        <div class="product-stock" id="product-stock"></div>
        
        <!-- Variants -->
        <div id="variants-container" style="margin-bottom: 1.5rem;"></div>

        <div class="product-desc" id="product-desc"></div>
        
        <div class="quantity-box">
          <span>數量：</span>
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="qty">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        
        <button class="btn btn-primary add-btn" onclick="addToCart()">🛒 加入購物車</button>
        <button class="btn btn-secondary buy-now-btn" onclick="buyNow()">即時購買</button>
        
        <div class="product-meta" style="margin-top: 2rem;">
          <div class="meta-row"><span class="meta-label">商品編碼</span><span id="meta-code"></span></div>
          <div class="meta-row"><span class="meta-label">Barcode</span><span id="meta-barcode"></span></div>
          <div class="meta-row"><span class="meta-label">分類</span><span id="meta-category"></span></div>
        </div>
      </div>
    </div>
    
    <div class="cross-selling" id="cross-selling">
      <h2>經常一起購買</h2>
      <div class="cross-selling-item">
        <img src="https://via.placeholder.com/75x75" alt="Product 1">
        <div class="item-info">
          <h3>產品名稱 1</h3>
          <p>產品描述 1</p>
        </div>
      </div>
      <div class="cross-selling-item">
        <img src="https://via.placeholder.com/75x75" alt="Product 2">
        <div class="item-info">
          <h3>產品名稱 2</h3>
          <p>產品描述 2</p>
        </div>
      </div>
      <div class="cross-selling-item">
        <img src="https://via.placeholder.com/75x75" alt="Product 3">
        <div class="item-info">
          <h3>產品名稱 3</h3>
          <p>產品描述 3</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-section"><h3>OHYA2.0</h3><a href="/">首頁</a></div>
      <div class="footer-section"><h3>客戶服務</h3><a href="#">聯繫我們</a></div>
      <div class="footer-section"><h3>付款方式</h3><a href="#">銀行轉帳</a></div>
    </div>
    <div class="footer-bottom">© 2026 OHYA2.0 All rights reserved.</div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    let currentProduct = null;
    let quantity = 1;
    let selectedVariant = null;
    
    async function loadProduct() {
      try {
        const res = await fetch('/api/products/' + productId);
        const product = await res.json();
        currentProduct = product;
        
        document.getElementById('product-name').textContent = product.name || '未命名產品';
        document.getElementById('product-code').textContent = product.product_code || '';
        document.getElementById('product-price').innerHTML = '¥' + (product.price || 0).toLocaleString();
        document.getElementById('product-desc').textContent = product.description || '暂无描述';
        updateStockDisplay(product.stock);
        
        if (product.image_url) {
          document.getElementById('product-image').src = product.image_url;
        }
        
        document.getElementById('meta-code').textContent = product.product_code || '-';
        document.getElementById('meta-barcode').textContent = product.barcode || '-';
        document.getElementById('meta-category').textContent = product.category || '-';
        
        // Load variants
        if (product.variants && product.variants.length > 0) {
          renderVariants(product.variants);
        }

        // Load thumbnails
        if (product.image_urls && product.image_urls.length > 0) {
          const thumbnailGallery = document.getElementById('thumbnail-gallery');
          thumbnailGallery.innerHTML = ''; // Clear mock data
          
          // Add main image
          if (product.image_url) {
             const mainThumb = createThumbnail(product.image_url, true);
             thumbnailGallery.appendChild(mainThumb);
          }

          product.image_urls.forEach((url) => {
            if (url !== product.image_url) {
              thumbnailGallery.appendChild(createThumbnail(url, false));
            }
          });
        }
      } catch (e) {
        console.error(e);
        document.getElementById('product-name').textContent = '載入失敗';
      }
    }

    function createThumbnail(url, isActive) {
      const img = document.createElement('img');
      img.src = url;
      img.className = 'thumbnail' + (isActive ? ' active' : '');
      img.onclick = () => changeMainImage(img);
      return img;
    }

    function renderVariants(variants) {
      const container = document.getElementById('variants-container');
      container.innerHTML = '<h3>選擇規格</h3><div class="variant-options" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;"></div>';
      const optionsContainer = container.querySelector('.variant-options');

      variants.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary variant-btn';
        btn.textContent = v.variant_name;
        btn.style.padding = '8px 16px';
        btn.onclick = () => selectVariant(v, btn);
        
        if (v.stock <= 0) {
          btn.disabled = true;
          btn.style.opacity = '0.5';
          btn.textContent += ' (缺貨)';
        }
        
        optionsContainer.appendChild(btn);
      });
    }

    function selectVariant(variant, btn) {
      selectedVariant = variant;
      
      // Update UI
      document.querySelectorAll('.variant-btn').forEach(b => {
        b.style.borderColor = '#e5e7eb';
        b.style.background = '#ffffff';
        b.style.color = '#1f2937';
      });
      btn.style.borderColor = '#6366f1';
      btn.style.background = '#e0e7ff';
      btn.style.color = '#4338ca';
      
      // Update Price
      const basePrice = currentProduct.price_retail || currentProduct.price;
      const finalPrice = basePrice + (variant.price_modifier || 0);
      document.getElementById('product-price').innerHTML = '¥' + finalPrice.toLocaleString();
      
      // Update Stock
      updateStockDisplay(variant.stock);
    }

    function updateStockDisplay(stock) {
      const el = document.getElementById('product-stock');
      if (stock > 0) {
        el.innerHTML = `<span class="in-stock">✓ 有貨 (庫存: ${stock})</span>`;
        document.querySelector('.add-btn').disabled = false;
        document.querySelector('.buy-now-btn').disabled = false;
      } else {
        // Check continue selling
        if (currentProduct.continue_selling) {
           el.innerHTML = `<span style="color:#f59e0b">⚠️ 缺貨但可預訂</span>`;
           document.querySelector('.add-btn').disabled = false;
           document.querySelector('.buy-now-btn').disabled = false;
        } else {
           el.innerHTML = `<span style="color:#ef4444">✗ 缺貨</span>`;
           document.querySelector('.add-btn').disabled = true;
           document.querySelector('.buy-now-btn').disabled = true;
        }
      }
    }
    
    function changeMainImage(thumbnail) {
      const mainImage = document.getElementById('product-image');
      mainImage.src = thumbnail.src;
      const thumbnails = document.querySelectorAll('.thumbnail');
      thumbnails.forEach(t => t.classList.remove('active'));
      thumbnail.classList.add('active');
    }
    
    function updateQty(delta) {
      quantity = Math.max(1, quantity + delta);
      document.getElementById('qty').textContent = quantity;
    }
    
    async function addToCart() {
      if (!currentProduct) return;
      
      // Check variant selection
      if (currentProduct.variants && currentProduct.variants.length > 0 && !selectedVariant) {
        alert('請選擇規格！');
        return;
      }

      const price = selectedVariant 
        ? (currentProduct.price_retail || currentProduct.price) + (selectedVariant.price_modifier || 0)
        : (currentProduct.price_retail || currentProduct.price);
      
      const cartItem = {
        productId: currentProduct.id,
        name: currentProduct.name + (selectedVariant ? ` (${selectedVariant.variant_name})` : ''),
        price: price,
        quantity: quantity,
        image_url: currentProduct.image_url,
        variantId: selectedVariant ? selectedVariant.id : null
      };

      // Use window.ohya2 if available (from main.js) or fetch directly
      // Since product.html uses fetch directly in original code, I'll stick to that but update the body
      // Actually, looking at main.js, it uses localStorage for cart.
      // The original product.html was using `fetch('/api/cart')` which implies a server-side cart?
      // But `main.js` said `let cart = JSON.parse(localStorage.getItem('ohya2_cart'))`
      // This is a CONTRADICTION.
      // `product.html` lines 218-228: `fetch('/api/cart', ...)`
      // `main.js` lines 8: `let cart = JSON.parse(localStorage.getItem('ohya2_cart'))`
      
      // I should align with `main.js` (Client-side cart) as it seems more complete for a static site.
      // OR if `server.js` has `/api/cart`, I should use that.
      // I checked `server.js`... I DID NOT see `/api/cart` endpoints!
      // I saw `/api/products`, `/api/orders`, etc.
      // So `product.html`'s `addToCart` was likely BROKEN or I missed the route.
      // Let me re-read `server.js` to be absolutely sure.
      
      // ... I checked `server.js` output previously. NO `/api/cart` endpoint.
      // So `product.html` was definitely calling a non-existent endpoint.
      // I must switch to using `localStorage` logic similar to `main.js`.
      
      let cart = JSON.parse(localStorage.getItem('ohya2_cart')) || [];
      
      // Check existing
      const existingIdx = cart.findIndex(i => i.productId === cartItem.productId && i.variantId === cartItem.variantId);
      
      if (existingIdx >= 0) {
        cart[existingIdx].quantity += quantity;
      } else {
        cart.push(cartItem);
      }
      
      localStorage.setItem('ohya2_cart', JSON.stringify(cart));
      alert('已加入購物車！');
      
      // Update badge if function exists
      if (window.loadCartCount) window.loadCartCount(); // This function in original code fetched from API... need to fix that too.
      
      const badge = document.getElementById('cart-count');
      if(badge) badge.textContent = cart.reduce((acc, item) => acc + item.quantity, 0);
    }
    
    // Fix loadCartCount to read from localStorage
    function loadCartCount() {
       let cart = JSON.parse(localStorage.getItem('ohya2_cart')) || [];
       document.getElementById('cart-count').textContent = cart.reduce((acc, item) => acc + item.quantity, 0);
    }
    
    async function buyNow() {
      await addToCart();
      window.location.href = '/checkout.html';
    }
    
    if (productId) {
      loadProduct();
    }
    loadCartCount();
  </script>
</body>
</html>
