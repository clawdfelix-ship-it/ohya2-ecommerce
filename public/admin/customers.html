<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客戶 - OHYA2.0 Admin</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f5f5f5; }
    .nav { background: #1a1a2e; padding: 10px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: #fff; text-decoration: none; padding: 10px 15px; display: inline-block; font-size: 14px; }
    .nav a.active { background: #ec4899; border-radius: 5px; }
    .main { padding: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 18px; }
    .btn { padding: 8px 16px; background: #6366f1; color: #fff; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #4f46e5; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-secondary { background: #9ca3af; }
    .btn-danger { background: #ef4444; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f8f9fa; font-weight: 600; }
    tr:hover { background: #f9fafb; cursor: pointer; }
    
    /* Badge styles */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-bronze { background: #cd7f32; color: #fff; }
    .badge-silver { background: #c0c0c0; color: #333; }
    .badge-gold { background: #ffd700; color: #333; }
    .badge-platinum { background: #e5e4e2; color: #333; }
    .badge-diamond { background: #b9f2ff; color: #333; }
    
    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; border-radius: 12px; padding: 20px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
    
    /* Card */
    .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    
    /* Tags */
    .tag { display: inline-block; padding: 4px 10px; background: #e0e7ff; color: #3730a3; border-radius: 15px; font-size: 12px; margin-right: 5px; margin-bottom: 5px; }
    .tag-remove { margin-left: 5px; cursor: pointer; color: #666; }
    .tag-input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 15px; font-size: 12px; width: 100px; }
    
    /* Form */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    
    /* Upgrade prompt */
    .upgrade-prompt { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
    .upgrade-prompt strong { color: #92400e; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">📊 總覽</a>
    <a href="orders.html">🛒 訂單</a>
    <a href="categories.html">🏷️ 分類</a>
    <a href="products.html">📦 產品</a>
    <a href="customers.html" class="active">👥 客戶</a>
    <a href="inventory.html">📈 庫存</a>
    <a href="coupons.html">🎟️ 優惠碼</a>
    <a href="settings.html">⚙️ 設定</a>
  </div>
  
  <div class="main">
    <h2>👥 客戶管理</h2>
    <div style="margin-bottom: 15px;">
      <button class="btn" onclick="showAddCustomer()">➕ 新增客戶</button>
    </div>
    <table id="customers-table"><tr><td>載入中...</td></tr></table>
  </div>

  <!-- Customer Detail Modal -->
  <div class="modal-overlay" id="customer-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">客戶詳情</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      
      <!-- 客戶資料 -->
      <div class="card">
        <div class="card-title">📋 客戶資料</div>
        <div class="form-group">
          <input type="hidden" id="cust-id">
          <label>名稱</label>
          <input type="text" id="cust-name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cust-email" style="background:#fff;">
        </div>
        <div class="form-group">
          <label>電話</label>
          <input type="text" id="cust-phone">
        </div>
        <div class="form-group">
          <label>地址</label>
          <textarea id="cust-address" rows="2"></textarea>
        </div>
        <button class="btn" onclick="saveCustomer()">💾 儲存資料</button>
      </div>
      
      <!-- 會員等級 -->
      <div class="card">
        <div class="card-title">⭐ 會員等級</div>
        <div style="display:flex;align-items:center;gap:15px;">
          <span id="membership-badge" class="badge badge-bronze" style="font-size:14px;padding:6px 12px;">Bronze</span>
          <div>
            <div>累積消費: <strong>$<span id="total-spent">0</span></strong></div>
            <div id="upgrade-prompt"></div>
          </div>
        </div>
      </div>
      
      <!-- 標籤 -->
      <div class="card">
        <div class="card-title">🏷️ 標籤</div>
        <div id="cust-tags" style="margin-bottom:10px;"></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <input type="text" id="new-tag" class="tag-input" placeholder="新增標籤">
          <button class="btn btn-sm" onclick="addTag()">➕ 添加</button>
        </div>
      </div>
      
      <!-- 購買歷史 -->
      <div class="card">
        <div class="card-title">🛒 購買歷史</div>
        <div id="order-history">
          <div style="color:#999;text-align:center;padding:20px;">暫無訂單</div>
        </div>
      </div>
      
      <div style="margin-top:20px;">
        <button class="btn btn-danger" onclick="deleteCustomer()">🗑️ 刪除客戶</button>
      </div>
    </div>
  </div>

  <script>
    let currentCustomerId = null;
    let currentCustomerData = null;
    
    // Load customers
    fetch('/api/customers').then(function(r){return r.json();}).then(function(d){
      var html = '<tr><th>ID</th><th>名稱</th><th>Email</th><th>電話</th><th>訂單數</th><th>消費總額</th><th>操作</th></tr>';
      d.forEach(function(c){
        var levelClass = getLevelClass(c.total);
        var levelName = getLevelName(c.total);
        html += '<tr onclick="viewCustomer('+c.id+')">';
        html += '<td>'+c.id+'</td>';
        html += '<td>'+(c.name||'-')+'</td>';
        html += '<td>'+(c.email||'-')+'</td>';
        html += '<td>'+(c.phone||'-')+'</td>';
        html += '<td>'+(c.orders||0)+'</td>';
        html += '<td>$'+(c.total||0)+' <span class="badge '+levelClass+'">'+levelName+'</span></td>';
        html += '<td><button class="btn btn-sm" onclick="event.stopPropagation();viewCustomer('+c.id+')">👁️ 檢視</button></td>';
        html += '</tr>';
      });
      document.getElementById('customers-table').innerHTML = html;
    });
    
    function getLevelClass(total) {
      if (total >= 50000) return 'badge-diamond';
      if (total >= 30000) return 'badge-platinum';
      if (total >= 15000) return 'badge-gold';
      if (total >= 5000) return 'badge-silver';
      return 'badge-bronze';
    }
    
    function getLevelName(total) {
      if (total >= 50000) return 'Diamond';
      if (total >= 30000) return 'Platinum';
      if (total >= 15000) return 'Gold';
      if (total >= 5000) return 'Silver';
      return 'Bronze';
    }
    
    function viewCustomer(id) {
      currentCustomerId = id;
      fetch('/api/customers/'+id).then(function(r){return r.json();}).then(function(d){
        currentCustomerData = d;
        
        // Fill customer info
        document.getElementById('modal-title').textContent = '客戶 #' + id;
        document.getElementById('cust-id').value = id;
        document.getElementById('cust-name').value = d.name || '';
        document.getElementById('cust-email').value = d.email || '';
        document.getElementById('cust-phone').value = d.phone || '';
        document.getElementById('cust-address').value = d.address || '';
        
        // Membership
        var level = d.membership_level || 'Bronze';
        var levelClass = getLevelClass(d.total_spent || 0);
        document.getElementById('membership-badge').textContent = level;
        document.getElementById('membership-badge').className = 'badge ' + levelClass;
        document.getElementById('total-spent').textContent = d.total_spent || 0;
        
        // Upgrade prompt
        if (d.next_level) {
          document.getElementById('upgrade-prompt').innerHTML = '<div class="upgrade-prompt">再消費 $'+d.amount_to_next+' 即可升級為 <strong>'+d.next_level+'</strong>！</div>';
        } else {
          document.getElement('upgrade-prompt').innerHTML = '<div style="color:#059669;font-weight:600;">🎉 已達最高會員等級！</div>';
        }
        
        // Tags
        renderTags(d.tags || []);
        
        // Orders
        renderOrders(d.orders || []);
        
        // Show modal
        document.getElementById('customer-modal').classList.add('active');
      });
    }
    
    function renderTags(tags) {
      var html = '';
      tags.forEach(function(tag) {
        html += '<span class="tag">'+tag+'<span class="tag-remove" onclick="removeTag(\''+tag+'\')">&times;</span></span>';
      });
      if (tags.length === 0) html = '<span style="color:#999;">無標籤</span>';
      document.getElementById('cust-tags').innerHTML = html;
    }
    
    function renderOrders(orders) {
      if (orders.length === 0) {
        document.getElementById('order-history').innerHTML = '<div style="color:#999;text-align:center;padding:20px;">暫無訂單</div>';
        return;
      }
      var html = '<table style="font-size:12px;"><tr><th>訂單ID</th><th>日期</th><th>金額</th><th>狀態</th></tr>';
      orders.forEach(function(o) {
        var statusClass = getStatusClass(o.status);
        var date = new Date(o.created_at).toLocaleDateString('zh-HK');
        html += '<tr>';
        html += '<td>#'+o.id+'</td>';
        html += '<td>'+date+'</td>';
        html += '<td>$'+o.total+'</td>';
        html += '<td><span class="badge '+statusClass+'">'+getStatusText(o.status)+'</span></td>';
        html += '</tr>';
      });
      html += '</table>';
      document.getElementById('order-history').innerHTML = html;
    }
    
    function getStatusClass(status) {
      var map = {
        'pending': 'badge-pending',
        'processing': 'badge-processing', 
        'shipped': 'badge-shipped',
        'completed': 'badge-completed',
        'refunded': 'badge-refunded',
        'cancelled': 'badge-cancelled'
      };
      return map[status] || '';
    }
    
    function getStatusText(status) {
      var map = {
        'pending': '待處理',
        'processing': '處理中',
        'shipped': '已發貨',
        'completed': '已完成',
        'refunded': '已退款',
        'cancelled': '已取消'
      };
      return map[status] || status;
    }
    
    function closeModal() {
      document.getElementById('customer-modal').classList.remove('active');
    }
    
    function saveCustomer() {
      var data = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        address: document.getElementById('cust-address').value
      };
      fetch('/api/customers/'+currentCustomerId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(function(r){return r.json();}).then(function(d){
        if (d.success) {
          alert('✅ 儲存成功！');
          location.reload();
        } else {
          alert('❌ 錯誤: '+d.error);
        }
      });
    }
    
    function addTag() {
      var tag = document.getElementById('new-tag').value.trim();
      if (!tag) return;
      fetch('/api/customers/'+currentCustomerId+'/tags', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tag: tag})
      }).then(function(r){return r.json();}).then(function(d){
        if (d.success) {
          document.getElementById('new-tag').value = '';
          viewCustomer(currentCustomerId); // Refresh
        }
      });
    }
    
    function removeTag(tag) {
      if (!confirm('確定要刪除標籤「'+tag+'」嗎？')) return;
      fetch('/api/customers/'+currentCustomerId+'/tags/'+encodeURIComponent(tag), {
        method: 'DELETE'
      }).then(function(r){return r.json();}).then(function(d){
        if (d.success) {
          viewCustomer(currentCustomerId); // Refresh
        }
      });
    }
    
    function deleteCustomer() {
      if (!confirm('⚠️ 確定要刪除此客戶嗎？此操作無法復原！')) return;
      alert('刪除功能待完成');
    }
    
    function showAddCustomer() {
      // Show the modal with empty form
      document.getElementById('modal-title').textContent = '新增客戶';
      document.getElementById('cust-id').value = '';
      document.getElementById('cust-name').value = '';
      document.getElementById('cust-email').value = '';
      document.getElementById('cust-phone').value = '';
      document.getElementById('cust-address').value = '';
      document.getElementById('customer-modal').style.display = 'flex';
    }
    
    function saveCustomer() {
      var id = document.getElementById('cust-id').value;
      var name = document.getElementById('cust-name').value;
      var email = document.getElementById('cust-email').value;
      var phone = document.getElementById('cust-phone').value;
      var address = document.getElementById('cust-address').value;
      
      if (!name || !email) {
        alert('請輸入名稱和Email');
        return;
      }
      
      var data = { name: name, email: email, phone: phone, address: address };
      var url = '/api/customers';
      var method = 'POST';
      
      if (id) {
        url = '/api/customers/' + id;
        method = 'PUT';
      }
      
      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }).then(function(r) { return r.json(); }).then(function(d) {
        alert(id ? '客戶已更新！' : '客戶已新增！');
        closeModal();
        loadCustomers();
      }).catch(function(e) {
        alert('錯誤: ' + e.message);
      });
    }
    
    // Close modal on overlay click
    document.getElementById('customer-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
  
  <style>
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-processing { background: #dbeafe; color: #1e40af; }
    .badge-shipped { background: #e0e7ff; color: #3730a3; }
    .badge-completed { background: #d1fae5; color: #065f46; }
    .badge-refunded { background: #fee2e2; color: #991b1b; }
    .badge-cancelled { background: #f3f4f6; color: #6b7280; }
  </style>
</body>
</html>
