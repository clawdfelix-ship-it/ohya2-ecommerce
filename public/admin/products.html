<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>產品 - OHYA2.0 Admin</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f5f5f5; }
    .nav { background: #1a1a2e; padding: 10px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: #fff; text-decoration: none; padding: 10px 15px; display: inline-block; font-size: 14px; }
    .nav a.active { background: #ec4899; border-radius: 5px; }
    .main { padding: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 16px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    .btn { padding: 8px 14px; background: #6366f1; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #4f46e5; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .search { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    .pagination { display: flex; gap: 5px; margin-top: 15px; align-items: center; }
    .pagination button { padding: 8px 12px; background: #6366f1; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    .pagination button:disabled { background: #ccc; cursor: not-allowed; }
    .pagination span { padding: 0 10px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">📊 總覽</a>
    <a href="orders.html">🛒 訂單</a>
    <a href="products.html" class="active">📦 產品</a>
    <a href="categories.html">🏷️ 分類</a>
    <a href="customers.html">👥 客戶</a>
    <a href="inventory.html">📈 庫存</a>
    <a href="coupons.html">🎟️ 優惠碼</a>
    <a href="settings.html">⚙️ 設定</a>
  </div>
  <div class="main">
    <h2>📦 產品管理</h2>
    
    <div class="toolbar">
      <input type="text" class="search" placeholder="🔍 搜尋產品..." id="search" onkeyup="filterProducts()">
      <select id="filter-category" onchange="filterProducts()" style="padding:8px;border:1px solid #ddd;border-radius:5px;">
        <option value="">全部分類</option>
      </select>
      <a href="product-edit.html" class="btn">+ 新增產品</a>
    </div>
    
    <table id="products-table">
      <thead>
        <tr>
          <th>圖片</th>
          <th>JAN</th>
          <th>編碼</th>
          <th>名稱</th>
          <th>零售</th>
          <th>庫存</th>
          <th>分類</th>
          <th>變體</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="products-body">
        <tr><td colspan="9">載入中...</td></tr>
      </tbody>
    </table>
    
    <div class="pagination" id="pagination"></div>
  </div>
  
  <script>
    var products = [];
    var categories = [];
    var currentPage = 1;
    var pageSize = 50;
    
    // Load products - with alert
    (async function loadData() {
      try {
        document.getElementById('products-body').innerHTML = '<tr><td colspan="9">Fetch緊...</td></tr>';
        
        var prodsResp = await fetch('/api/products');
        products = await prodsResp.json();
        alert('Products loaded: ' + products.length);
        
        var catsResp = await fetch('/api/categories');
        categories = await catsResp.json();
        alert('Categories loaded: ' + categories.length);
        
        var catSelect = document.getElementById('filter-category');
        var mainCats = categories.filter(function(c){return !c.parent_id;});
        mainCats.forEach(function(c){
          catSelect.innerHTML += '<option value="'+c.name+'">'+c.name+'</option>';
        });
        
        renderProducts(products);
      } catch(e) {
        console.error('Load error:', e);
        document.getElementById('products-body').innerHTML = '<tr><td colspan="9" style="color:red;">載入失敗</td></tr>';
      }
    })();
    
    function renderProducts(list) {
      var start = (currentPage - 1) * pageSize;
      var end = start + pageSize;
      var pageItems = list.slice(start, end);
      
      var html = '';
      pageItems.forEach(function(p){
        var img = p.image_url || (p.image_urls && p.image_urls.length > 0 ? p.image_urls[0] : '');
        var hasVariants = p.variants && p.variants.length > 0;
        html += '<tr>' +
          '<td>'+(img ? '<img src="'+img+'" style="width:40px;height:40px;object-fit:cover;border-radius:4px;">' : '-')+'</td>' +
          '<td>'+(p.jan_code||'-')+'</td>' +
          '<td>'+(p.product_code||'')+'</td>' +
          '<td>'+(p.name||'').substring(0,25)+'</td>' +
          '<td><b>$'+(p.price_retail||p.price||0)+'</b></td>' +
          '<td style="color:'+((p.stock||0)<5?'red':'')+'">'+(p.stock||0)+'</td>' +
          '<td>'+(p.category||'-')+'</td>' +
          '<td>'+(hasVariants ? '<span style="background:#22c55e;color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;">' + p.variants.length + '</span>' : '-')+'</td>' +
          '<td><a href="product-edit.html?id='+p.id+'" class="btn btn-sm">編輯</a></td>' +
        '</tr>';
      });
      document.getElementById('products-body').innerHTML = html || '<tr><td colspan="9">暫無產品</td></tr>';
      
      // Render pagination
      var totalPages = Math.ceil(list.length / pageSize);
      var pg = document.getElementById('pagination');
      if (totalPages > 1) {
        var pgHtml = '<button '+(currentPage===1?'disabled':' onclick="goToPage('+(currentPage-1)+')")+'">上一頁</button>';
        pgHtml += '<span>第 ' + currentPage + ' / ' + totalPages + ' 頁 (共 ' + list.length + ' 個產品)</span>';
        pgHtml += '<button '+(currentPage===totalPages?'disabled':' onclick="goToPage('+(currentPage+1)+')")+'">下一頁</button>';
        pg.innerHTML = pgHtml;
      } else {
        pg.innerHTML = '<span>共 ' + list.length + ' 個產品</span>';
      }
    }
    
    function goToPage(page) {
      currentPage = page;
      filterProducts();
    }
    
    function filterProducts() {
      var q = document.getElementById('search').value.toLowerCase();
      var cat = document.getElementById('filter-category').value;
      var filtered = products.filter(function(p){
        var matchSearch = (p.name||'').toLowerCase().indexOf(q) >= 0 || 
                        (p.product_code||'').toLowerCase().indexOf(q) >= 0 ||
                        (p.jan_code||'').toLowerCase().indexOf(q) >= 0;
        var matchCat = !cat || p.category === cat;
        return matchSearch && matchCat;
      });
      renderProducts(filtered);
    }
  </script>
</body>
</html>
