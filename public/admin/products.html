<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>з”ўе“Ғ - OHYA2.0 Admin</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f5f5f5; }
    .nav { background: #1a1a2e; padding: 10px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: #fff; text-decoration: none; padding: 10px 15px; display: inline-block; font-size: 14px; }
    .nav a.active { background: #ec4899; border-radius: 5px; }
    .main { padding: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 16px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    .btn { padding: 8px 14px; background: #6366f1; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #4f46e5; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .search { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    .pagination { display: flex; gap: 5px; margin-top: 15px; align-items: center; }
    .pagination button { padding: 8px 12px; background: #6366f1; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    .pagination button:disabled { background: #ccc; cursor: not-allowed; }
    .pagination span { padding: 0 10px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">рҹ“Ҡ зёҪиҰҪ</a>
    <a href="orders.html">рҹӣ’ иЁӮе–®</a>
    <a href="products.html" class="active">рҹ“Ұ з”ўе“Ғ</a>
    <a href="categories.html">рҹҸ·пёҸ еҲҶйЎһ</a>
    <a href="customers.html">рҹ‘Ҙ е®ўжҲ¶</a>
    <a href="inventory.html">рҹ“Ҳ еә«еӯҳ</a>
    <a href="coupons.html">рҹҺҹпёҸ е„Әжғ зўј</a>
    <a href="settings.html">вҡҷпёҸ иЁӯе®ҡ</a>
  </div>
  <div class="main">
    <h2>рҹ“Ұ з”ўе“Ғз®ЎзҗҶ</h2>
    
    <div class="toolbar">
      <input type="text" class="search" placeholder="рҹ”Қ жҗңе°Ӣз”ўе“Ғ..." id="search" onkeyup="filterProducts()">
      <select id="filter-category" onchange="filterProducts()" style="padding:8px;border:1px solid #ddd;border-radius:5px;">
        <option value="">е…ЁйғЁеҲҶйЎһ</option>
      </select>
      <a href="product-edit.html" class="btn">+ ж–°еўһз”ўе“Ғ</a>
    </div>
    
    <table id="products-table">
      <thead>
        <tr>
          <th>ең–зүҮ</th>
          <th>JAN</th>
          <th>з·Ёзўј</th>
          <th>еҗҚзЁұ</th>
          <th>йӣ¶е”®</th>
          <th>еә«еӯҳ</th>
          <th>еҲҶйЎһ</th>
          <th>и®Ҡй«”</th>
          <th>ж“ҚдҪң</th>
        </tr>
      </thead>
      <tbody id="products-body">
        <tr><td colspan="9">ијүе…Ҙдёӯ...</td></tr>
      </tbody>
    </table>
    
    <div class="pagination" id="pagination"></div>
  </div>
  
  <script>
    var products = [];
    var categories = [];
    var currentPage = 1;
    var pageSize = 20;
    
    // Load products - with status update
    (async function loadData() {
      const debugEl = document.getElementById('products-body');
      
      // Timeout handler
      const timeoutId = setTimeout(() => {
        if (debugEl.innerHTML.includes('рҹ”„')) {
          debugEl.innerHTML = '<tr><td colspan="9" style="color:orange;">вҡ пёҸ ијүе…ҘжҷӮй–“йҒҺй•·пјҢи«ӢжӘўжҹҘз¶ІзөЎжҲ–йҮҚж–°ж•ҙзҗҶгҖӮ <button onclick="location.reload()" class="btn btn-sm">йҮҚж–°ж•ҙзҗҶ</button></td></tr>';
        }
      }, 15000);

      try {
        debugEl.innerHTML = '<tr><td colspan="9">рҹ”„ йҖЈжҺҘдјәжңҚеҷЁдёӯ... (v1.1)</td></tr>';
        
        const start = Date.now();
        var prodsResp = await fetch('/api/products');
        
        if (!prodsResp.ok) {
           const text = await prodsResp.text();
           throw new Error(`API Error ${prodsResp.status}: ${text.substring(0, 50)}`);
        }
        
        debugEl.innerHTML = '<tr><td colspan="9">рҹ”„ и§Јжһҗж•ёж“ҡдёӯ... (' + (Date.now() - start) + 'ms)</td></tr>';
        
        products = await prodsResp.json();
        
        // Safety check if products is array
        if (!Array.isArray(products)) {
           console.error('Products is not an array:', products);
           products = [];
        }
        
        debugEl.innerHTML = '<tr><td colspan="9">рҹ”„ ијүе…ҘеҲҶйЎһ... ('+products.length+' з”ўе“Ғ)</td></tr>';
        
        try {
            var catsResp = await fetch('/api/categories');
            if (catsResp.ok) {
                categories = await catsResp.json();
                
                var catSelect = document.getElementById('filter-category');
                // Clear existing options except first
                catSelect.innerHTML = '<option value="">е…ЁйғЁеҲҶйЎһ</option>';
                
                var mainCats = categories.filter(function(c){return !c.parent_id;});
                mainCats.forEach(function(c){
                  catSelect.innerHTML += '<option value="'+c.name+'">'+c.name+'</option>';
                });
            }
        } catch (catError) {
            console.warn('Failed to load categories:', catError);
            // Continue rendering products even if categories fail
        }
        
        clearTimeout(timeoutId);
        renderProducts(products);
      } catch(e) {
        clearTimeout(timeoutId);
        console.error('Load error:', e);
        debugEl.innerHTML = '<tr><td colspan="9" style="color:red;">ијүе…ҘеӨұж•—: ' + e.message + '<br><button onclick="location.reload()" class="btn btn-sm" style="margin-top:10px;">йҮҚи©Ұ</button></td></tr>';
      }
    })();
    
    function renderProducts(list) {
      var start = (currentPage - 1) * pageSize;
      var end = start + pageSize;
      var pageItems = list.slice(start, end);
      
      var html = '';
      pageItems.forEach(function(p){
        var img = p.image_url || (p.image_urls && p.image_urls.length > 0 ? p.image_urls[0] : '');
        var hasVariants = p.variants && p.variants.length > 0;
        html += '<tr>' +
          '<td>'+(img ? '<img src="'+img+'" style="width:40px;height:40px;object-fit:cover;border-radius:4px;">' : '-')+'</td>' +
          '<td>'+(p.jan_code||'-')+'</td>' +
          '<td>'+(p.product_code||'')+'</td>' +
          '<td>'+(p.name||'').substring(0,25)+'</td>' +
          '<td><b>$'+(p.price_retail||p.price||0)+'</b></td>' +
          '<td style="color:'+((p.stock||0)<5?'red':'')+'">'+(p.stock||0)+'</td>' +
          '<td>'+(p.category||'-')+'</td>' +
          '<td>'+(hasVariants ? '<span style="background:#22c55e;color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;">' + p.variants.length + '</span>' : '-')+'</td>' +
          '<td><a href="product-edit.html?id='+p.id+'" class="btn btn-sm">з·ЁијҜ</a></td>' +
        '</tr>';
      });
      document.getElementById('products-body').innerHTML = html || '<tr><td colspan="9">жҡ«з„Ўз”ўе“Ғ</td></tr>';
      
      // Render pagination
      var totalPages = Math.ceil(list.length / pageSize);
      var pg = document.getElementById('pagination');
      if (totalPages > 1) {
        var pgHtml = '<button '+(currentPage===1?'disabled':' onclick="goToPage('+(currentPage-1)+')")+'">дёҠдёҖй Ғ</button>';
        pgHtml += '<span>з¬¬ ' + currentPage + ' / ' + totalPages + ' й Ғ (е…ұ ' + list.length + ' еҖӢз”ўе“Ғ)</span>';
        pgHtml += '<button '+(currentPage===totalPages?'disabled':' onclick="goToPage('+(currentPage+1)+')")+'">дёӢдёҖй Ғ</button>';
        pg.innerHTML = pgHtml;
      } else {
        pg.innerHTML = '<span>е…ұ ' + list.length + ' еҖӢз”ўе“Ғ</span>';
      }
    }
    
    function goToPage(page) {
      currentPage = page;
      filterProducts();
    }
    
    function filterProducts() {
      var q = document.getElementById('search').value.toLowerCase();
      var cat = document.getElementById('filter-category').value;
      var filtered = products.filter(function(p){
        var matchSearch = (p.name||'').toLowerCase().indexOf(q) >= 0 || 
                        (p.product_code||'').toLowerCase().indexOf(q) >= 0 ||
                        (p.jan_code||'').toLowerCase().indexOf(q) >= 0;
        var matchCat = !cat || p.category === cat;
        return matchSearch && matchCat;
      });
      renderProducts(filtered);
    }
  </script>
</body>
</html>
