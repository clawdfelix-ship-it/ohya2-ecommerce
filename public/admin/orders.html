<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單 - OHYA2.0 Admin</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f5f5f5; }
    .nav { background: #1a1a2e; padding: 10px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: #fff; text-decoration: none; padding: 10px 15px; display: inline-block; font-size: 14px; }
    .nav a.active { background: #ec4899; border-radius: 5px; }
    .main { padding: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 16px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .toolbar-left { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f9fafb; }
    .btn { padding: 8px 14px; background: #6366f1; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #4f46e5; }
    .btn-secondary { background: #9ca3af; }
    .btn-danger { background: #ef4444; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .checkbox { width: 18px; height: 18px; }
    .selected-bar { display: none; background: #e0e7ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; }
    .selected-bar.active { display: flex; align-items: center; gap: 10px; }
    .selected-count { font-weight: bold; color: #3730a3; }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-processing { background: #dbeafe; color: #1e40af; }
    .badge-shipped { background: #e0e7ff; color: #3730a3; }
    .badge-completed { background: #d1fae5; color: #065f46; }
    .badge-refunded { background: #fee2e2; color: #991b1b; }
    .badge-cancelled { background: #f3f4f6; color: #6b7280; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">📊 總覽</a>
    <a href="orders.html" class="active">🛒 訂單</a>
    <a href="products.html">📦 產品</a>
    <a href="categories.html">🏷️ 分類</a>
    <a href="customers.html">👥 客戶</a>
    <a href="inventory.html">📈 庫存</a>
    <a href="coupons.html">🎟️ 優惠碼</a>
    <a href="settings.html">⚙️ 設定</a>
  </div>
  <div class="main">
    <h2>🛒 訂單管理</h2>
    
    <!-- 批次操作Bar -->
    <div class="selected-bar" id="selected-bar">
      <span class="selected-count">已選擇 <span id="selected-count">0</span> 張訂單</span>
      <button class="btn" onclick="batchUpdateStatus()">改狀態</button>
      <button class="btn btn-danger" onclick="batchDelete()">刪除所選</button>
      <button class="btn btn-secondary" onclick="clearSelection()">清除選擇</button>
    </div>
    
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="order-new.html" class="btn">+ 新增訂單</a>
      </div>
      <select id="filter-status" onchange="filterOrders()" style="padding:8px;border:1px solid #ddd;border-radius:5px;">
        <option value="">全部狀態</option>
        <option value="pending">待處理</option>
        <option value="processing">處理中</option>
        <option value="shipped">已發貨</option>
        <option value="completed">已完成</option>
        <option value="refunded">已退款</option>
        <option value="cancelled">已取消</option>
      </select>
    </div>
    
    <table id="orders-table">
      <thead>
        <tr>
          <th><input type="checkbox" class="checkbox" onchange="toggleAll(this)"></th>
          <th>ID</th>
          <th>客戶</th>
          <th>產品</th>
          <th>總額</th>
          <th>狀態</th>
          <th>物流單號</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="8">載入中...</td></tr>
      </tbody>
    </table>
  </div>
  
  <script>
    var orders = [];
    var selectedIds = [];
    
    fetch('/api/orders').then(function(r){return r.json();}).then(function(d){
      orders = d;
      renderOrders(d);
    });
    
    function renderOrders(list) {
      var html = '';
      list.forEach(function(o){
        var items = o.items || [];
        var productsText = items.slice(0,2).map(function(i){return i.product_name || 'Product';}).join(', ');
        if(items.length > 2) productsText += '...';
        
        var checked = selectedIds.indexOf(o.id) >= 0 ? 'checked' : '';
        var trackingText = o.tracking_number ? '<span style="color:#10b981;font-size:11px;">' + o.tracking_number + '</span>' : '-';
        
        html += '<tr>' +
          '<td><input type="checkbox" class="checkbox" ' + checked + ' onchange="toggleSelect(' + o.id + ')"></td>' +
          '<td>#' + o.id + '</td>' +
          '<td>' + (o.customer_name || 'Guest') + '</td>' +
          '<td>' + (productsText || '-') + '</td>' +
          '<td>$' + (o.total || 0) + '</td>' +
          '<td><span class="badge badge-' + (o.status || 'pending') + '">' + (o.status || 'pending') + '</span></td>' +
          '<td>' + trackingText + '</td>' +
          '<td>' + (o.created_at || '-').substring(0,10) + '</td>' +
          '<td><a href="order-edit.html?id=' + o.id + '" class="btn btn-sm">編輯</a></td>' +
        '</tr>';
      });
      document.getElementById('orders-body').innerHTML = html || '<tr><td colspan="9">暫無訂單</td></tr>';
    }
    
    function toggleSelect(id) {
      var idx = selectedIds.indexOf(id);
      if(idx >= 0) {
        selectedIds.splice(idx, 1);
      } else {
        selectedIds.push(id);
      }
      updateSelectedBar();
    }
    
    function toggleAll(checkbox) {
      if(checkbox.checked) {
        var filtered = getFilteredOrders();
        selectedIds = filtered.map(function(o){return o.id;});
      } else {
        selectedIds = [];
      }
      renderOrders(getFilteredOrders());
      updateSelectedBar();
    }
    
    function updateSelectedBar() {
      var bar = document.getElementById('selected-bar');
      var count = document.getElementById('selected-count');
      count.innerText = selectedIds.length;
      if(selectedIds.length > 0) {
        bar.classList.add('active');
      } else {
        bar.classList.remove('active');
      }
    }
    
    function clearSelection() {
      selectedIds = [];
      renderOrders(getFilteredOrders());
      updateSelectedBar();
    }
    
    function getFilteredOrders() {
      var status = document.getElementById('filter-status').value;
      if(!status) return orders;
      return orders.filter(function(o){return o.status === status;});
    }
    
    function filterOrders() {
      renderOrders(getFilteredOrders());
    }
    
    function batchUpdateStatus() {
      var status = prompt('輸入新狀態 (pending/processing/shipped/completed/refunded/cancelled):');
      if(!status) return;
      
      var promises = selectedIds.map(function(id){
        return fetch('/api/orders/' + id, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status: status})
        });
      });
      
      Promise.all(promises).then(function(){
        alert('已更新 ' + selectedIds.length + ' 張訂單');
        clearSelection();
        location.reload();
      });
    }
    
    function batchDelete() {
      if(!confirm('確定要刪除 ' + selectedIds.length + ' 張訂單嗎？')) return;
      
      var promises = selectedIds.map(function(id){
        return fetch('/api/orders/' + id, { method: 'DELETE' });
      });
      
      Promise.all(promises).then(function(){
        alert('已刪除 ' + selectedIds.length + ' 張訂單');
        clearSelection();
        location.reload();
      });
    }
  </script>
</body>
</html>
